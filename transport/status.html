<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZombieCoder — Transport Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #111;
      border-bottom: 1px solid #333;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; color: #00ff88; }
    .header .status { font-size: 12px; color: #888; }
    .header .status.connected { color: #00ff88; }
    .header .status.disconnected { color: #ff4444; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 0;
      padding: 16px;
    }
    .card.running { border-left: 3px solid #00ff88; }
    .card.stopped { border-left: 3px solid #ff4444; }
    .card.error { border-left: 3px solid #ffaa00; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-name { font-size: 14px; font-weight: bold; color: #fff; }
    .card-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 0;
      text-transform: uppercase;
    }
    .badge-running { background: #00ff8822; color: #00ff88; }
    .badge-stopped { background: #ff444422; color: #ff4444; }
    .badge-error { background: #ffaa0022; color: #ffaa00; }

    .card-detail {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .card-detail span { color: #aaa; }

    .latency { font-size: 11px; color: #666; margin-top: 8px; }
    .latency.good { color: #00ff88; }
    .latency.medium { color: #ffaa00; }
    .latency.bad { color: #ff4444; }

    .tunnel-section {
      padding: 24px;
      border-top: 1px solid #333;
    }
    .tunnel-section h2 {
      font-size: 14px;
      color: #00ff88;
      margin-bottom: 16px;
    }
    .route-table {
      width: 100%;
      border-collapse: collapse;
    }
    .route-table th, .route-table td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      font-size: 12px;
    }
    .route-table th { color: #666; text-transform: uppercase; font-size: 10px; }
    .route-table td { color: #aaa; }
    .route-table .domain { color: #00ff88; }
    .route-table .port { color: #ffaa00; }

    .log-section {
      padding: 24px;
      border-top: 1px solid #333;
    }
    .log-section h2 {
      font-size: 14px;
      color: #00ff88;
      margin-bottom: 16px;
    }
    .log-entry {
      font-size: 11px;
      color: #666;
      padding: 4px 0;
      border-bottom: 1px solid #111;
    }
    .log-entry .time { color: #555; }
    .log-entry .event { color: #aaa; }
    .log-entry .success { color: #00ff88; }
    .log-entry .error { color: #ff4444; }

    .footer {
      padding: 16px 24px;
      border-top: 1px solid #333;
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ZOMBIECODER TRANSPORT</h1>
    <div class="status" id="connectionStatus">Connecting...</div>
  </div>

  <div class="grid" id="servicesGrid"></div>

  <div class="tunnel-section">
    <h2>TUNNEL ROUTES</h2>
    <table class="route-table" id="routeTable">
      <thead>
        <tr>
          <th>DOMAIN</th>
          <th>PORT</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="routeBody"></tbody>
    </table>
  </div>

  <div class="log-section">
    <h2>EVENT LOG</h2>
    <div id="logContainer"></div>
  </div>

  <div class="footer">
    ZombieCoder Transport — Real-time Service Monitoring
  </div>

  <script>
    const statusEl = document.getElementById('connectionStatus');
    const gridEl = document.getElementById('servicesGrid');
    const routeBody = document.getElementById('routeBody');
    const logContainer = document.getElementById('logContainer');

    const logs = [];
    function addLog(event, type = 'info') {
      const time = new Date().toLocaleTimeString();
      logs.unshift({ time, event, type });
      if (logs.length > 50) logs.pop();
      renderLogs();
    }

    function renderLogs() {
      logContainer.innerHTML = logs.map(l => `
        <div class="log-entry">
          <span class="time">${l.time}</span>
          <span class="${l.type}">${l.event}</span>
        </div>
      `).join('');
    }

    function renderServices(services) {
      gridEl.innerHTML = services.map(s => {
        const badgeClass = s.status === 'running' ? 'badge-running' : 
                          s.status === 'stopped' ? 'badge-stopped' : 'badge-error';
        const latencyClass = s.latency < 100 ? 'good' : 
                            s.latency < 500 ? 'medium' : 'bad';
        return `
          <div class="card ${s.status}">
            <div class="card-header">
              <span class="card-name">${s.name}</span>
              <span class="card-badge ${badgeClass}">${s.status}</span>
            </div>
            <div class="card-detail">Domain: <span class="domain">${s.domain}</span></div>
            <div class="card-detail">Port: <span class="port">${s.port}</span></div>
            <div class="latency ${latencyClass}">
              ${s.latency >= 0 ? `Latency: ${s.latency}ms` : 'Unreachable'}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderRoutes(tunnel) {
      if (!tunnel?.domains) return;
      routeBody.innerHTML = Object.entries(tunnel.domains).map(([domain, port]) => `
        <tr>
          <td class="domain">${domain}</td>
          <td class="port">${port}</td>
          <td><span class="card-badge badge-running">ACTIVE</span></td>
        </tr>
      `).join('');
    }

    // SSE connection
    let eventSource;
    function connectSSE() {
      eventSource = new EventSource('/events');
      
      eventSource.onopen = () => {
        statusEl.textContent = 'CONNECTED';
        statusEl.className = 'status connected';
        addLog('SSE connection established', 'success');
      };

      eventSource.addEventListener('health', (e) => {
        const services = JSON.parse(e.data);
        renderServices(services);
        addLog(`Health check: ${services.length} services`);
      });

      eventSource.onerror = () => {
        statusEl.textContent = 'DISCONNECTED';
        statusEl.className = 'status disconnected';
        addLog('SSE connection lost', 'error');
        setTimeout(connectSSE, 5000);
      };
    }

    // Load tunnel config
    fetch('/tunnel')
      .then(r => r.json())
      .then(tunnel => {
        renderRoutes(tunnel);
        addLog('Tunnel config loaded', 'success');
      })
      .catch(() => addLog('Failed to load tunnel config', 'error'));

    // Initial health check
    fetch('/health')
      .then(r => r.json())
      .then(data => {
        renderServices(data.services);
        addLog(`Initial check: ${data.services.length} services`);
      })
      .catch(() => addLog('Initial health check failed', 'error'));

    connectSSE();
  </script>
</body>
</html>
